<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="js/admin.js" defer></script>
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-primary shadow text-black">
        <div class="container-fluid">

            <!-- Logo -->
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-speedometer2"></i> AdminPanel
            </a>

            <!-- Bouton mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarAdmin">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="navbarAdmin">

                <!-- Menu centré -->
                <ul class="navbar-nav mx-auto text-center">

                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            <i class="bi bi-house-door"></i> Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#" id="linkReservations">
                            <i class="bi bi-calendar-check"></i> Réservations
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#" id="linkUsers">
                            <i class="bi bi-people"></i> Utilisateurs
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="bi bi-gear"></i> Paramètres
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="bi bi-box-seam"></i> Services
                        </a>
                    </li>

                </ul>

                <!-- Déconnexion -->
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-warning fw-bold" href="#" id="logout">
                            <i class="bi bi-box-arrow-right"></i> Déconnexion
                        </a>
                    </li>
                </ul>

            </div>
        </div>
    </nav>
    <div class="container mt-5 bg-black text-white p-4 rounded text-center" id="dashboardHome">
        <h1>Bienvenue sur le tableau de bord de l'administrateur</h1>
        <p>Gérez les réservations, les utilisateurs et les paramètres du site ici.</p>
        <!-- Ajoutez ici les fonctionnalités spécifiques à l'administrateur -->
    </div>
    <!-- Modal Message pour le client -->
    <div class="modal fade" id="modalMessageClient" tabindex="-1" aria-labelledby="modalMessageLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-light text-dark">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalMessageLabel">Message à envoyer au client</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
                </div>
                <div class="modal-body">
                    <textarea id="messageClient" class="form-control" rows="10" readonly></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-success" id="copyMessage">Copier dans le presse-papier</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal pour choisir une chambre -->
    <div class="modal fade" id="modalChambre" tabindex="-1" aria-labelledby="modalChambreLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalChambreLabel">Choisir une chambre</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
                </div>
                <div class="modal-body">
                    <label for="selectChambre" class="form-label">Chambres disponibles :</label>
                    <select id="selectChambre" class="form-select">
                        <option value="">Chargement...</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <!-- bouton Confirmer pour valider la chambre sélectionnée -->
                    <button type="button" id="confirmChambre" class="btn btn-primary">Confirmer</button>
                    <!-- bouton Annuler  pour fermer le modal -->
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                </div>
            </div>
        </div>
    </div>
    <div id="adminContent" class="mt-4 d-none">
        <!-- Contenu dynamique -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
