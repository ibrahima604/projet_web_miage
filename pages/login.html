<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Blue Lagoon Retreat</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/app.js" defer></script>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <div class="login-card text-center">

        <img src="../src/images/logo_web.png" alt="logo"
            class="rounded-circle mb-3"
            style="width: 100px; height: 100px; object-fit: cover;">

        <h2>Blue Lagoon</h2>
        <p class="mb-4 text-light">Connexion à votre espace</p>

        <form id="loginForm">

            <div id="message"></div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="email" placeholder="Email" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-key"></i></span>
                <input type="password" class="form-control" id="password" placeholder="Mot de passe" required>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Se souvenir</label>
                </div>
                <a href="#">Mot de passe oublié ?</a>
            </div>

            <button type="submit" class="btn btn-custom w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Se connecter
            </button>

        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
