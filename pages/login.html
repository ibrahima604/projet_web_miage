<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="../js/app.js" defer></script>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <div class="container mt-5">
        <!-- Formulaire de connexion -->
        <form action="" method="post" id="loginForm">
            <fieldset class="mb-4">
                <legend class="text-center">Connexion</legend>
                <img src="../src/images/logo_web.png" alt="Image de connexion"
                    class="img-fluid mb-4 rounded-circle d-block mx-auto"
                    style="width: 150px; height: 150px; object-fit: cover;">
                <div id="message"></div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Mot de passe"
                        required>
                </div>
                <div class="form-check mt-3 d-flex justify-content-between align-items-center mb-4 w-100">
                    <span class="form-check-label d-flex align-items-center">
                        <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
                        Se souvenir de moi
                    </span>

                    <a href="#" class="form-check-label text-decoration-none">Mot de passe oublié ?</a>
                </div>
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary px-4 py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Se connecter
                    </button>
                </div>
            </fieldset>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
