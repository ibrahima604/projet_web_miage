<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation - Blue Lagoon</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/reserver.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="../js/reserver.js" defer></script>
</head>

<body>

<div class="reservation-card text-center">

    <img src="../src/images/logo_web.png"
        class="rounded-circle mb-3"
        style="width: 90px; height: 90px; object-fit: cover;">

    <h2>Réserver votre séjour</h2>
    <p class="text-light mb-4">Blue Lagoon Retreat vous attend</p>

    <form id="reservationForm">

        <div id="message"></div>

        <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="name" placeholder="Nom complet" required>
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
            <input type="tel" class="form-control" id="phone" placeholder="Téléphone" required>
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email" placeholder="Email" required>
        </div>

        <div class="row mb-3">
            <div class="col">
                <input type="date" class="form-control" id="date" required>
            </div>
            <div class="col">
                <input type="date" class="form-control" id="date_fin" required>
            </div>
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-people"></i></span>
            <input type="number" min="1" max="5" class="form-control" id="guests"
                placeholder="Nombre de personnes" required>
        </div>

        <div class="input-group mb-4">
            <span class="input-group-text"><i class="bi bi-card-text"></i></span>
            <textarea class="form-control" id="requests"
                placeholder="Demandes spéciales"
                rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-custom w-100 py-2">
            <i class="bi bi-check-circle me-2"></i>
            Confirmer la réservation
        </button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
