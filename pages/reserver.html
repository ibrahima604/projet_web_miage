<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="../js/reserver.js" defer></script>
    <link rel="stylesheet" href="../css/reserver.css">
</head>

<body>
    <div class="container mt-5">

        <!-- Formulaire de connexion -->
        <form action="" method="post" id="reservationForm">
            <fieldset class="mb-4">
                <legend class="text-center">Reservation</legend>
                <img src="../src/images/logo_web.png" alt="Image de connexion"
                    class="img-fluid mb-4 rounded-circle d-block mx-auto"
                    style="width: 150px; height: 150px; object-fit: cover;">
                <div id="message"></div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Nom complet" required>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="Numéro de téléphone"
                        required>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                    <input type="date" class="form-control" id="date_fin" name="date_fin" placeholder="date fin">
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-people"></i></span>
                    <input type="number" class="form-control" id="guests" name="nbr_personne"
                        placeholder="Nombre de personnes" required>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-card-text"></i></span>
                    <textarea class="form-control" id="requests" name="demande" placeholder="Demandes spéciales"
                        rows="3"></textarea>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-4 p-3 border rounded bg-light">

    <span class="fs-5 text-success">
        <i class="bi bi-check2-square"></i>
    </span>

    <button type="submit" class="btn btn-primary px-4">
        Réserver
    </button>
</div>
                
            </fieldset>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
